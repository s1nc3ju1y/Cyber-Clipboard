<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0B0B0E"/>
  
  <!-- Grid Background -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0, 240, 255, 0.15)" stroke-width="2"/>
  </pattern>
  <rect width="512" height="512" fill="url(#grid)"/>

  <!-- Glowing outer border -->
  <rect x="96" y="128" width="320" height="320" fill="none" stroke="#00F0FF" stroke-width="16" rx="16"/>
  <rect x="112" y="144" width="288" height="288" fill="none" stroke="#FF003C" stroke-width="8" rx="8"/>
  
  <!-- Clipboard Clip -->
  <path d="M 192 64 L 320 64 L 320 128 L 192 128 Z" fill="#FCE205" stroke="#000" stroke-width="8"/>
  <path d="M 224 48 L 288 48 L 288 80 L 224 80 Z" fill="#0B0B0E" stroke="#FCE205" stroke-width="4"/>

  <!-- Lines of text/code -->
  <line x1="160" y1="224" x2="352" y2="224" stroke="#00F0FF" stroke-width="16" stroke-linecap="square"/>
  <line x1="160" y1="288" x2="288" y2="288" stroke="#FF003C" stroke-width="16" stroke-linecap="square"/>
  <line x1="160" y1="352" x2="320" y2="352" stroke="#FCE205" stroke-width="16" stroke-linecap="square"/>
  
  <!-- Blinking Cursor -->
  <rect x="336" y="344" width="16" height="16" fill="#00F0FF"/>
</svg>